# Local development services for Minutely.
#
# Usage:
#   docker compose up -d                 # start MySQL in the background
#   docker compose logs -f mysql         # tail the MySQL log
#   docker compose ps                    # see status
#   docker compose down                  # stop (data persists in the volume)
#   docker compose down -v               # stop AND wipe the data volume
#
# The web app reads DATABASE_URL from web/.env.local, NOT from this file.
# Make sure the credentials there match what the container exposes
# (default: root/root on localhost:3306, database "minutely").

services:
  # ─── Diarization service ────────────────────────────────────────────
  #
  # Three modes available, switch via the `dockerfile:` line below + the
  # DIARIZATION_MODE env var in diarization/.env:
  #
  #   • Dockerfile.mock (default) — tiny image, returns synthetic speaker
  #     segments. No HF account or GPU needed. Good for end-to-end testing
  #     the rest of the pipeline locally.
  #   • Dockerfile.cpu  — real pyannote.audio on CPU. Slow (10–30× realtime)
  #     but accurate. Requires HUGGINGFACE_TOKEN + accepted model terms.
  #   • Dockerfile     — real pyannote.audio on GPU. Production target.
  #
  # First start of a real-mode image downloads ~1 GB of model weights into
  # the named volume `minutely-hf-cache`. Subsequent starts are fast.
  diarization:
    build:
      context: ./diarization
      dockerfile: Dockerfile.mock
    image: minutely-diarization:mock
    container_name: minutely-diarization
    restart: unless-stopped
    env_file:
      - ./diarization/.env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      # Persist model weights across container replacements.
      - minutely-hf-cache:/root/.cache/huggingface
      - minutely-torch-cache:/root/.cache/torch
    extra_hosts:
      # Lets the diarization container reach the host's localhost:3000
      # (the Next.js dev server) at http://host.docker.internal:3000.
      # Docker Desktop on Mac/Windows resolves this automatically; on Linux,
      # this mapping makes it work too.
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 90s

  mysql:
    build:
      context: ./infra/mysql
    image: minutely-mysql:local
    container_name: minutely-mysql
    restart: unless-stopped
    environment:
      # The base image creates this database on first start. The init SQL
      # in infra/mysql/init/ also adds an application user; pick either set
      # of credentials for DATABASE_URL.
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: minutely
      TZ: UTC
    ports:
      # host:container — bind to localhost only so the DB isn't exposed
      # outside this machine.
      - "127.0.0.1:3306:3306"
    volumes:
      - minutely-mysql-data:/var/lib/mysql
    healthcheck:
      test:
        - "CMD"
        - "mysqladmin"
        - "ping"
        - "-h"
        - "127.0.0.1"
        - "-uroot"
        - "-proot"
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

volumes:
  minutely-mysql-data:
    name: minutely-mysql-data
  minutely-hf-cache:
    name: minutely-hf-cache
  minutely-torch-cache:
    name: minutely-torch-cache
