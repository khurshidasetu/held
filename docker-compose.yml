# Local development services for Held.
#
# Usage:
#   docker compose up -d                 # start MySQL + diarization
#   docker compose logs -f mysql         # tail the MySQL log
#   docker compose ps                    # see status
#   docker compose down                  # stop (data persists in volumes)
#   docker compose down -v               # stop AND wipe data volumes
#
# The web app reads DATABASE_URL from web/.env.local, NOT from this file.
# Make sure the credentials there match what the container exposes
# (default: root/root on localhost:3306, database "held").
#
# Note on volume naming: `held-mysql-data` is the on-disk Docker volume
# that holds the MySQL data files (your recordings, transcripts, summaries).
# The first time you `docker compose up` after this rename, it expects to
# find that volume — if you're migrating from an older `minutely-mysql-data`
# volume, see the rename migration steps in the README before bringing
# the stack up.

services:
  # ─── Diarization service ────────────────────────────────────────────
  #
  # Three modes available, switch via the `dockerfile:` line below + the
  # DIARIZATION_MODE env var in diarization/.env:
  #
  #   • Dockerfile.mock (default) — tiny image, returns synthetic speaker
  #     segments. No HF account or GPU needed. Good for end-to-end testing
  #     the rest of the pipeline locally.
  #   • Dockerfile.cpu  — real pyannote.audio on CPU. Slow (10–30× realtime)
  #     but accurate. Requires HUGGINGFACE_TOKEN + accepted model terms.
  #   • Dockerfile     — real pyannote.audio on GPU. Production target.
  #
  # First start of a real-mode image downloads ~1 GB of model weights into
  # the named volume `held-hf-cache`. Subsequent starts are fast.
  diarization:
    build:
      context: ./diarization
      dockerfile: Dockerfile.cpu
    image: held-diarization:cpu
    container_name: held-diarization
    restart: unless-stopped
    env_file:
      - ./diarization/.env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      # Persist model weights across container replacements.
      - held-hf-cache:/root/.cache/huggingface
      - held-torch-cache:/root/.cache/torch
    extra_hosts:
      # Lets the diarization container reach the host's localhost:3000
      # (the Next.js dev server) at http://host.docker.internal:3000.
      # Docker Desktop on Mac/Windows resolves this automatically; on Linux,
      # this mapping makes it work too.
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 90s

  mysql:
    build:
      context: ./infra/mysql
    image: held-mysql:local
    container_name: held-mysql
    restart: unless-stopped
    environment:
      # The base image creates this database on first start. The init SQL
      # in infra/mysql/init/ also adds an application user; pick either set
      # of credentials for DATABASE_URL.
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: held
      TZ: UTC
    ports:
      # host:container — bind to localhost only so the DB isn't exposed
      # outside this machine.
      - "127.0.0.1:3306:3306"
    volumes:
      - held-mysql-data:/var/lib/mysql
    healthcheck:
      test:
        - "CMD"
        - "mysqladmin"
        - "ping"
        - "-h"
        - "127.0.0.1"
        - "-uroot"
        - "-proot"
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

volumes:
  # All three volumes still live on disk under their original `minutely-*`
  # names. We can't rename a Docker volume in place (would require
  # clone+delete with a ~1 GB pyannote weights re-download), so compose
  # references them as `external: true` and we use `held-*` only as the
  # service-local alias. Fresh-install users (no existing minutely-*
  # volumes) should drop `name:` + `external: true` and let compose
  # create plain `held-*` volumes — `docker compose down -v` will then
  # do the right thing on cleanup.
  held-mysql-data:
    name: minutely-mysql-data
    external: true
  held-hf-cache:
    name: minutely-hf-cache
    external: true
  held-torch-cache:
    name: minutely-torch-cache
    external: true
